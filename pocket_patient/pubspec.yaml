name: pocket_patient
description: PocketPatient mobile app — Rutgers clinical simulation
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.0.0
  go_router: ^14.0.0
  dio: ^5.0.0
  flutter_secure_storage: ^9.0.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.0.0
  file_picker: ^8.0.0
  connectivity_plus: ^6.0.0
  shared_preferences: ^2.0.0
  fl_chart: ^0.69.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#CC0033"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#CC0033"
  image: "assets/icon/splash_glyph.png"
  android_12:
    color: "#CC0033"
    image: "assets/icon/splash_glyph.png"
  android: true
  ios: true
